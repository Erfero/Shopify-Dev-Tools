services:
  - type: web
    name: shopify-dev-tools-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://shopify-dev-tools.vercel.app
      - key: AI_PRESET
        value: best
      - key: USE_MOCK
        value: false
      - key: TEMP_DIR
        value: /tmp/shopify-theme-temp
      - key: SESSION_TTL_SECONDS
        value: 14400
      - key: IMGBB_API_KEY
        value: fbf73d5df50aaa2f61f11a8ae662419f
      - key: BACKEND_URL
        value: https://shopify-dev-tools-api.onrender.com
